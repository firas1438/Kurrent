name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install dependencies
        working-directory: frontend
        run: npm ci

      - name: lint
        working-directory: frontend
        run: npm run lint

      - name: build
        working-directory: frontend
        run: npm run build

  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: install dependencies
        working-directory: backend
        run: npm ci

      - name: test (simple syntax check for now)
        working-directory: backend
        run: |
          node --check src/app.js
          node --check src/server.js